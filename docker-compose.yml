services:
  app:
    build: ./Finadoc.Web
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - AiService__BaseUrl=http://ai:8000
      - AiService__InternalApiKey=${INTERNAL_API_KEY}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=finadoc;Username=${POSTGRES_USER:-finadoc};Password=${POSTGRES_PASSWORD:-finadoc_secret}
      - Storage__Endpoint=http://minio:9000
      - Storage__AccessKey=${MINIO_ROOT_USER:-finadoc}
      - Storage__SecretKey=${MINIO_ROOT_PASSWORD:-finadoc_secret}
      - Storage__DocumentsBucket=finadoc-documents
      - Storage__OutputsBucket=finadoc-outputs
      - DataProtection__KeysPath=/data/keys
    volumes:
      - app_data:/data
    depends_on:
      ai:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  ai:
    build: ./finadoc_ai
    expose:
      - "8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    volumes:
      - finadoc_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-finadoc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-finadoc_secret}
      - POSTGRES_DB=finadoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finadoc} -d finadoc"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-finadoc}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-finadoc_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-finadoc}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-finadoc_secret}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/finadoc-documents &&
        mc mb --ignore-existing local/finadoc-outputs &&
        echo 'MinIO buckets ready.'
      "

volumes:
  postgres_data:
  minio_data:
  app_data:
  finadoc_data:
