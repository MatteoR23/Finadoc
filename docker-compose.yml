services:
  app:
    build: ./Finadoc.Web
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - AiService__BaseUrl=http://ai:8000
      - AiService__InternalApiKey=${INTERNAL_API_KEY}
    volumes:
      - finadoc_data:/data
    depends_on:
      ai:
        condition: service_healthy

  ai:
    build: ./finadoc_ai
    expose:
      - "8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - finadoc_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  finadoc_data:
